<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Plus+Jakarta+Sans:wght@200..800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-variant": "#e3e2e1",
              "surface-dim": "#dadad9",
              "tertiary-fixed-dim": "#c8c6c5",
              "secondary-fixed-dim": "#eac081",
              "on-secondary-fixed": "#281800",
              "primary": "#550007",
              "secondary-container": "#ffd393",
              "on-primary-fixed": "#410004",
              "on-tertiary-fixed-variant": "#474747",
              "on-surface": "#1a1c1c",
              "surface-tint": "#ab3332",
              "on-tertiary-fixed": "#1b1c1c",
              "primary-container": "#7a0c14",
              "error": "#ba1a1a",
              "outline": "#8c716f",
              "secondary-fixed": "#ffdeae",
              "inverse-surface": "#2f3130",
              "surface-bright": "#faf9f8",
              "tertiary": "#262626",
              "on-background": "#1a1c1c",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "on-secondary-fixed-variant": "#5e410e",
              "tertiary-container": "#3b3b3b",
              "secondary": "#785924",
              "background": "#faf9f8",
              "tertiary-fixed": "#e4e2e1",
              "surface-container-high": "#e9e8e7",
              "on-secondary-container": "#795a25",
              "outline-variant": "#dfbfbc",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "inverse-on-surface": "#f1f0f0",
              "primary-fixed": "#ffdad7",
              "on-primary-container": "#ff807a",
              "on-tertiary-container": "#a7a5a5",
              "on-surface-variant": "#58413f",
              "surface-container-low": "#f4f3f2",
              "primary-fixed-dim": "#ffb3ae",
              "on-error": "#ffffff",
              "surface-container": "#eeeeed",
              "on-primary-fixed-variant": "#8a1a1e",
              "on-secondary": "#ffffff",
              "inverse-primary": "#ffb3ae",
              "surface-container-highest": "#e3e2e1",
              "surface": "#faf9f8"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #7a0c14 0%, #550007 100%);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        input[type="checkbox"]:checked {
            background-color: #7a0c14;
            border-color: #7a0c14;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- Focused View Header: Back-to-Main Exception applied (No shared TopAppBar) -->
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-xl flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<a class="text-on-surface hover:text-primary-container transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</a>
<h1 class="font-headline text-xl font-bold tracking-tight text-on-surface">Payments</h1>
</div>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label text-sm font-medium">History</span>
</button>
</header>
<main class="max-w-xl mx-auto px-6 pb-40">
<!-- Balance Display -->
<section class="py-8">
<div class="flex flex-col gap-1">
<span class="font-label text-xs uppercase tracking-widest text-secondary font-bold">Total Pending</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-4xl font-extrabold text-on-surface">$</span>
<span class="font-headline text-5xl font-extrabold text-on-surface tracking-tighter">524.99</span>
</div>
</div>
</section>
<!-- Segmented Control -->
<nav class="flex gap-8 border-b border-outline-variant/20 mb-8">
<button class="pb-3 border-b-2 border-primary text-on-surface font-bold text-sm">Pending (3)</button>
<button class="pb-3 border-b-2 border-transparent text-on-surface-variant font-medium text-sm hover:text-primary transition-colors">Completed</button>
<button class="pb-3 border-b-2 border-transparent text-on-surface-variant font-medium text-sm hover:text-primary transition-colors">Upcoming</button>
</nav>
<!-- Payment Items List -->
<div class="flex flex-col gap-4">
<!-- Item 1 -->
<label class="group relative flex items-center gap-4 p-4 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all cursor-pointer shadow-sm shadow-on-surface/5">
<div class="flex items-center justify-center">
<input checked="" class="h-6 w-6 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<span class="font-headline font-bold text-on-surface text-base group-hover:text-primary transition-colors">Monthly Rent &amp; Utilities</span>
<span class="font-label text-sm text-on-surface-variant">Due: Oct 28, 2023</span>
</div>
<div class="text-right flex flex-col items-end">
<span class="font-headline font-bold text-on-surface">$450.00</span>
<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-secondary-container text-on-secondary-container uppercase tracking-wide">Standard</span>
</div>
</label>
<!-- Item 2 -->
<label class="group relative flex items-center gap-4 p-4 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all cursor-pointer shadow-sm shadow-on-surface/5">
<div class="flex items-center justify-center">
<input checked="" class="h-6 w-6 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<span class="font-headline font-bold text-on-surface text-base group-hover:text-primary transition-colors">Monthly Subscription</span>
<span class="font-label text-sm text-on-surface-variant">Due: Oct 20, 2023</span>
</div>
<div class="text-right flex flex-col items-end">
<span class="font-headline font-bold text-on-surface">$49.99</span>
<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-secondary-container text-on-secondary-container uppercase tracking-wide">Concierge</span>
</div>
</label>
<!-- Item 3 -->
<label class="group relative flex items-center gap-4 p-4 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all cursor-pointer shadow-sm shadow-on-surface/5">
<div class="flex items-center justify-center">
<input class="h-6 w-6 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<span class="font-headline font-bold text-on-surface text-base group-hover:text-primary transition-colors">Spa Reservation Fee</span>
<span class="font-label text-sm text-on-surface-variant">Booking ID: #SPA-1015</span>
</div>
<div class="text-right flex flex-col items-end">
<span class="font-headline font-bold text-on-surface">$25.00</span>
<div class="flex items-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-secondary-fixed-dim"></div>
<span class="text-[10px] font-bold text-secondary uppercase tracking-wide">Verified</span>
</div>
</div>
</label>
<!-- Item 4 (Maintenance) -->
<label class="group relative flex items-center gap-4 p-4 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all cursor-pointer shadow-sm shadow-on-surface/5">
<div class="flex items-center justify-center">
<input class="h-6 w-6 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<span class="font-headline font-bold text-on-surface text-base group-hover:text-primary transition-colors">HVAC Maintenance Fee</span>
<span class="font-label text-sm text-on-surface-variant">Service Date: Oct 12, 2023</span>
</div>
<div class="text-right flex flex-col items-end">
<span class="font-headline font-bold text-on-surface">$75.00</span>
<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-surface-container-highest text-on-surface-variant uppercase tracking-wide">Maintenance</span>
</div>
</label>
</div>
<!-- Selection Summary Section -->
<div class="mt-12 p-6 rounded-2xl bg-surface-container-low border border-outline-variant/10">
<h3 class="font-headline font-bold text-on-surface mb-4">Payment Method</h3>
<div class="flex items-center gap-4 p-3 rounded-lg bg-surface-container-lowest border border-outline-variant/20">
<div class="w-10 h-6 bg-tertiary-container rounded flex items-center justify-center text-[8px] text-white font-bold tracking-tighter">VISA</div>
<div class="flex-1 flex flex-col">
<span class="text-sm font-bold text-on-surface">Premium Debit Card</span>
<span class="text-xs text-on-surface-variant">Ends in 4242</span>
</div>
<button class="text-primary font-bold text-xs uppercase">Edit</button>
</div>
</div>
</main>
<!-- Sticky Bottom Payment Bar -->
<div class="fixed bottom-0 left-0 right-0 z-[60] px-4 pb-8 pt-6 bg-surface/90 backdrop-blur-2xl border-t border-outline-variant/10">
<div class="max-w-xl mx-auto flex items-center justify-between gap-6">
<div class="flex flex-col">
<span class="font-label text-xs font-medium text-on-surface-variant">2 Items Selected</span>
<div class="flex items-baseline gap-1">
<span class="font-headline text-xl font-bold text-on-surface">$</span>
<span class="font-headline text-2xl font-extrabold text-on-surface tracking-tight">499.99</span>
</div>
</div>
<button class="flex-1 max-w-[240px] h-14 bg-primary-gradient rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-3 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="lock" data-weight="fill">lock</span>
<span class="font-headline text-white font-bold text-lg">Pay Now</span>
</button>
</div>
</div>
</body></html>
